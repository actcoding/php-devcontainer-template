name: Prebuild Devcontainer

on:
  push:
    branches:
      - main
    paths:
      - .devcontainer
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    concurrency:
      group: devcontainer
      cancel-in-progress: true
    steps:
      - name: Login to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build & Push
        run: |
          bunx --bun @devcontainers/cli --workspace-folder . \
            --push \
            --image-name "${{ env.REGISTRY }}/${{ github.repository }}/devcontainer" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --platform linux/amd64,linux/arm64
      
